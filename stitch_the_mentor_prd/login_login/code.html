<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - The Mentor</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecab",
                        "primary-dark": "#0fb382",
                        "background-light": "#f6f8f7",
                        "background-dark": "#10221c",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a2e28",
                        "text-main": "#111816",
                        "text-muted": "#61897d",
                        "border-light": "#dbe6e2",
                        "border-dark": "#2a4038",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col antialiased">
<!-- Header (Simplified for Login Page) -->
<header class="flex items-center justify-between whitespace-nowrap px-10 py-4 absolute w-full top-0 left-0 z-10">
<div class="flex items-center gap-4 text-text-main dark:text-white">
<div class="size-8 text-primary">
<svg class="w-full h-full" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M24 4C25.7818 14.2173 33.7827 22.2182 44 24C33.7827 25.7818 25.7818 33.7827 24 44C22.2182 33.7827 14.2173 25.7818 4 24C14.2173 22.2182 22.2182 14.2173 24 4Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em]">The Mentor</h2>
</div>
<div class="hidden md:flex items-center gap-2">
<span class="text-sm font-medium text-text-muted dark:text-gray-400">Don't have an account?</span>
<a class="text-sm font-bold text-text-main dark:text-white hover:text-primary transition-colors" href="#">Sign up</a>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center p-4 pt-20">
<div class="w-full max-w-[480px] bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm border border-border-light dark:border-border-dark p-8 md:p-10 relative overflow-hidden">
<!-- Decorative gradient blur -->
<div class="absolute -top-20 -right-20 w-40 h-40 bg-primary/20 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -bottom-20 -left-20 w-40 h-40 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="relative z-10">
<div class="text-center mb-8">
<h1 class="text-text-main dark:text-white text-3xl font-bold tracking-tight mb-2">Welcome Back</h1>
<p class="text-text-muted dark:text-gray-400 text-base">Login to access your dashboard and exam prep materials.</p>
</div>
<form action="#" class="space-y-5" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-text-main dark:text-gray-200" for="email">Email Address</label>
<div class="relative">
<input class="form-input block w-full rounded-xl border-border-light dark:border-border-dark bg-white dark:bg-background-dark text-text-main dark:text-white focus:border-primary focus:ring-primary h-12 px-4 placeholder:text-text-muted/60" id="email" name="email" placeholder="student@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-medium text-text-main dark:text-gray-200" for="password">Password</label>
<a class="text-sm font-medium text-primary hover:text-primary-dark dark:hover:text-primary/80 transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative flex items-center">
<input class="form-input block w-full rounded-xl border-border-light dark:border-border-dark bg-white dark:bg-background-dark text-text-main dark:text-white focus:border-primary focus:ring-primary h-12 pl-4 pr-12 placeholder:text-text-muted/60" id="password" name="password" placeholder="Enter your password" required="" type="password"/>
<button class="absolute right-4 text-text-muted dark:text-gray-500 hover:text-text-main dark:hover:text-gray-300 focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-5 w-5 rounded border-border-light dark:border-border-dark text-primary focus:ring-primary bg-white dark:bg-background-dark" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-text-main dark:text-gray-300" for="remember-me">
                            Remember me for 30 days
                        </label>
</div>
<!-- Submit Button -->
<button class="w-full flex items-center justify-center rounded-xl bg-primary hover:bg-primary-dark text-text-main font-bold text-base h-12 transition-all shadow-sm hover:shadow-md active:scale-[0.98]" type="submit">
                        Sign In
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border-light dark:border-border-dark"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-surface-light dark:bg-surface-dark px-3 text-sm text-text-muted dark:text-gray-500">Or continue with</span>
</div>
</div>
<!-- Social Login Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 rounded-xl border border-border-light dark:border-border-dark bg-white dark:bg-background-dark hover:bg-gray-50 dark:hover:bg-gray-800/50 h-12 transition-colors" type="button">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-medium text-text-main dark:text-white">Google</span>
</button>
<button class="flex items-center justify-center gap-2 rounded-xl border border-border-light dark:border-border-dark bg-white dark:bg-background-dark hover:bg-gray-50 dark:hover:bg-gray-800/50 h-12 transition-colors" type="button">
<svg aria-hidden="true" class="h-5 w-5 text-[#0077B5]" fill="currentColor" viewbox="0 0 24 24">
<path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"></path>
</svg>
<span class="text-sm font-medium text-text-main dark:text-white">LinkedIn</span>
</button>
</div>
</div>
</div>
<!-- Mobile footer link -->
<div class="md:hidden absolute bottom-8 left-0 w-full text-center">
<span class="text-sm font-medium text-text-muted dark:text-gray-400">Don't have an account?</span>
<a class="text-sm font-bold text-text-main dark:text-white ml-1" href="#">Sign up</a>
</div>
</main>
</body></html>
